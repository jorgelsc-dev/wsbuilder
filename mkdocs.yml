site_name: PortHound Docs
site_description: Documentacion oficial de PortHound
site_author: PortHound Authors
site_url: https://porthound.jorgelsc.dev/
repo_url: https://github.com/jorgelsc-dev/wsbuilder
repo_name: PortHound
edit_uri: edit/main/docs/

nav:
  - Inicio: index.md
  - Empezar: getting-started.md
  - Aplicacion:
      - Resumen: application/index.md
      - Facil: application/easy.md
      - Avanzada: application/advanced.md
      - Guia completa: guia-completa.md
  - Arquitectura: architecture.md
  - Ayuda:
      - Resumen: help/index.md
      - Microservicios: help/microservices.md
  - Referencia:
      - Resumen: reference/index.md
      - HTTP y respuesta: reference/http.md
      - WebSocket: reference/websocket.md
      - ORM: reference/orm.md
      - Cache: reference/cache.md
      - Seguridad: reference/security.md
      - Metricas: reference/metrics.md
      - Tareas en background: reference/tasks.md
      - Utilidades HTTP: reference/utilities.md
      - DNS local: reference/dns.md
      - Avanzado: reference/advanced.md

theme:
  name: material
  language: es
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/extra.css

plugins:
  - search
