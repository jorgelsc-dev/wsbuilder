site_name: wsbuilder
site_description: Documentacion oficial de wsbuilder
site_author: wsbuilder Authors
repo_name: wsbuilder
site_url: https://wsbuilder.jorgelsc.dev/

nav:
  - Inicio: index.md
  - Empezar: getting-started.md
  - Arquitectura: architecture.md
  - Referencia:
      - Resumen: reference/index.md
      - HTTP y respuesta: reference/http.md
      - WebSocket: reference/websocket.md
      - ORM: reference/orm.md
      - Cache: reference/cache.md
      - Seguridad: reference/security.md
      - Metricas: reference/metrics.md
      - DNS local: reference/dns.md
      - Avanzado: reference/advanced.md
  - Despliegue:
      - GitHub Pages: deployment/github-pages.md

theme:
  name: material
  language: es
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: teal
      accent: amber
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/extra.css

plugins:
  - search
