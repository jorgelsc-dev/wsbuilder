site_name: WSBuilder Docs
site_description: Documentacion oficial de WSBuilder
site_author: WSBuilder Authors
site_url: https://wsbuilder.jorgelsc.dev/
repo_url: https://github.com/jorgelsc-dev/wsbuilder
repo_name: WSBuilder
edit_uri: edit/main/docs/

nav:
  - Inicio: index.md
  - Instalacion: install.md

theme:
  name: material
  language: es
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - toc:
      permalink: true

plugins:
  - search
