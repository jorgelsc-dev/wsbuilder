name: main-pr-policy-check

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: read

jobs:
  enforce-source:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR source branch policy
        run: |
          set -euo pipefail
          echo "base=${{ github.base_ref }} head=${{ github.head_ref }}"
          if [ -z "${{ github.head_ref }}" ]; then
            echo "ERROR: missing pull request source branch"
            exit 1
          fi
          if [ "${{ github.head_ref }}" = "main" ]; then
            echo "ERROR: PR source branch cannot be main"
            exit 1
          fi
          if [[ ! "${{ github.head_ref }}" =~ ^(feat|fix|docs|chore|refactor|test|perf)/[a-z0-9._-]+$ ]]; then
            echo "ERROR: source branch must match <type>/<slug> using one of feat, fix, docs, chore, refactor, test, perf"
            exit 1
          fi
          echo "OK: PR hacia main con source branch valida."
