name: main-only-from-release

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: read

jobs:
  enforce-source:
    runs-on: ubuntu-latest
    steps:
      - name: Validate source branch
        run: |
          set -euo pipefail
          echo "base=${{ github.base_ref }} head=${{ github.head_ref }}"
          case "${{ github.head_ref }}" in
            staging)
              echo "OK: main acepta PR desde staging"
              ;;
            release/*)
              echo "OK: main acepta PR desde release/*"
              ;;
            *)
              echo "ERROR: main solo acepta PR desde release/* o staging"
              exit 1
              ;;
          esac
