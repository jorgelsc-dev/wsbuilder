name: main-pr-source-check

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited, ready_for_review]

permissions:
  contents: read

jobs:
  enforce-source:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR source metadata
        run: |
          set -euo pipefail
          echo "base=${{ github.base_ref }} head=${{ github.head_ref }}"
          if [ -z "${{ github.head_ref }}" ]; then
            echo "ERROR: missing pull request source branch"
            exit 1
          fi
          echo "OK: PR hacia main con branch origen detectada."
