name: release-on-main

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-on-main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version and tag
        id: meta
        run: |
          set -euo pipefail

          version="$(python3 - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          version = (data.get('project') or {}).get('version')
          if version is None:
              version = ((data.get('tool') or {}).get('poetry') or {}).get('version')
          if not version:
              raise SystemExit('Could not resolve version from pyproject.toml')
          print(version)
          PY
          )"

          tag="v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.meta.outputs.tag_exists != 'true'
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin main --tags
          git checkout -B main origin/main
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          BRANCH: ${{ steps.meta.outputs.branch }}
        run: |
          set -euo pipefail

          notes_file="$(mktemp)"
          {
            echo "## Release automática"
            echo
            echo "- Rama: ${BRANCH}"
            echo "- Tag: ${TAG}"
            echo "- Versión: ${VERSION}"
            echo "- Commit: ${GITHUB_SHA}"
          } > "$notes_file"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "Release ${TAG}" --notes-file "$notes_file"
          else
            gh release create "$TAG" --target main --title "Release ${TAG}" --notes-file "$notes_file"
          fi
