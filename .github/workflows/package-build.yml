name: package-build

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - staging
      - main
      - "release/*"
  pull_request:
    branches:
      - develop
      - staging
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest

      - name: Build package
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Run tests
        run: |
          PYTHONPATH=src pytest -q

      - name: Smoke test wheel install
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/python -m pip install --upgrade pip
          .venv-smoke/bin/python -m pip install dist/*.whl
          .venv-smoke/bin/python -c "import wsbuilder; print('wsbuilder', wsbuilder.__version__)"
          .venv-smoke/bin/wsbuilder --help

      - name: Upload package artifacts
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ github.run_id }}
          path: dist/*
          if-no-files-found: error
